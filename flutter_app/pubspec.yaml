name: ginj
description: A Flutter app for the Parent-Child Rhyme Gift journey.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  flutter_dotenv: ^5.0.2
  google_fonts: ^5.0.0
  provider: ^6.0.5
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.0
  flutter_lints: ^2.0.0

flutter_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
